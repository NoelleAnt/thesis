services:
  mysql:
    image: mysql:8.4
    container_name: asap-agap-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: asap_agap
      MYSQL_USER: asap
      MYSQL_PASSWORD: asap_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -prootpassword --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
